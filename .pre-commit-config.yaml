repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # keep ruff version in sync with .github/workflows/test-type-lint.yaml
    rev: v0.15.8
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        language_version: python3
